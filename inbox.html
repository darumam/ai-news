<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="GitHub Actionsが公式ソース巡回で見つけた、未要約のAI更新通知。"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; img-src 'self' data:; base-uri 'none'; frame-ancestors 'none'; form-action 'none'"
    />
    <title>AI Signal Board | 更新通知</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body data-page="inbox">
    <header class="site-header">
      <nav class="site-nav" aria-label="メインナビゲーション">
        <a href="index.html">ニュース</a>
        <a class="active" href="inbox.html">更新通知</a>
        <a href="compare.html">機能比較</a>
      </nav>
      <div class="hero-layout">
        <div>
          <p class="eyebrow">Crawler Inbox</p>
          <h1>更新通知</h1>
          <p class="lead">
            GitHub Actionsが公式ソースから見つけた未要約候補。ここに何かあれば、Codexで確認して正式掲載します。
          </p>
        </div>
        <aside class="summary-panel" aria-label="通知サマリー">
          <span class="summary-label">未処理</span>
          <strong id="inbox-count">読み込み中</strong>
          <span id="inbox-updated">GitHub Actions巡回</span>
        </aside>
      </div>
    </header>

    <main>
      <section class="section-header" aria-labelledby="inbox-policy">
        <div>
          <p class="eyebrow">Policy</p>
          <h2 id="inbox-policy">通知の扱い</h2>
        </div>
        <p>
          このページはAI要約前の軽いタイトル確認用です。Codexが要約してニュースへ掲載したURLは、次回更新時に通知から消えます。
        </p>
      </section>

      <section
        id="inbox-list"
        class="inbox-list"
        aria-live="polite"
        aria-label="未要約の更新通知一覧"
      >
        <p class="loading-text">通知を読み込んでいます。</p>
      </section>
    </main>
  </body>
</html>
