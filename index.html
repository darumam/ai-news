<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="公式ソースだけを対象に、AI関連の重要アップデートを短く日本語で要約する個人用ダッシュボード。"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; img-src 'self' data:; base-uri 'none'; frame-ancestors 'none'; form-action 'none'"
    />
    <title>AIシグナルボード | ニュース</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body data-page="news">
    <header class="site-header">
      <nav class="site-nav" aria-label="メインナビゲーション">
        <a class="active" href="index.html">ニュース</a>
        <a href="feature-news.html">機能追加</a>
        <a href="compare.html">機能比較</a>
      </nav>
      <div class="hero-layout">
        <div>
          <h1>1分AIトレンド</h1>
        </div>
        <aside class="summary-panel" aria-label="更新サマリー">
          <span class="summary-label">最終更新</span>
          <strong id="news-updated">読み込み中</strong>
          <span id="news-count">要約済みニュース</span>
        </aside>
      </div>
    </header>

    <main>
      <section class="section-header" aria-labelledby="today-focus">
        <div>
          <h2 id="today-focus">これだけ読め</h2>
        </div>
      </section>

      <section
        id="must-read-list"
        class="must-read-list"
        aria-live="polite"
        aria-label="超重要ニュース一覧"
      >
        <p class="loading-text">ニュースを読み込んでいます。</p>
      </section>

      <section class="section-header compact-section" aria-labelledby="trend-tabs-title">
        <div>
          <h2 id="trend-tabs-title">機能面タブ</h2>
        </div>
      </section>

      <section aria-label="機能面別ニュース">
        <div class="tab-list" role="tablist" aria-label="ニュース分類">
          <button class="tab-button active" type="button" data-group="text">テキスト・対話</button>
          <button class="tab-button" type="button" data-group="media">画像・動画</button>
          <button class="tab-button" type="button" data-group="dev">開発・API</button>
          <button class="tab-button" type="button" data-group="business">ビジネス</button>
        </div>
        <div id="group-news-list" class="compact-news-list" aria-live="polite">
          <p class="loading-text">分類ニュースを読み込んでいます。</p>
        </div>
      </section>

      <section class="section-header compact-section" aria-labelledby="history-title">
        <div>
          <h2 id="history-title">過去ニュース</h2>
        </div>
      </section>

      <section class="table-wrap" aria-label="過去ニュース一覧">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>提供元</th>
              <th>分類</th>
              <th>状態</th>
              <th>タイトル</th>
              <th>公式</th>
            </tr>
          </thead>
          <tbody id="news-history">
            <tr>
              <td colspan="6">ニュース履歴を読み込んでいます。</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
