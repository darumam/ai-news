<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="公式情報にもとづく、開発者向けAI機能の比較ページ。"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; img-src 'self' data:; base-uri 'none'; frame-ancestors 'none'; form-action 'none'"
    />
    <title>AI Signal Board | 機能比較</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body data-page="compare">
    <header class="site-header">
      <nav class="site-nav" aria-label="メインナビゲーション">
        <a href="index.html">ニュース</a>
        <a href="inbox.html">更新通知</a>
        <a class="active" href="compare.html">機能比較</a>
      </nav>
      <div class="hero-layout">
        <div>
          <p class="eyebrow">Feature Matrix</p>
          <h1>機能比較</h1>
          <p class="lead">
            API、エージェント、コード支援、音声、MCPなど、開発で使うAI機能を公式情報ベースで比較します。
          </p>
        </div>
        <aside class="summary-panel" aria-label="比較サマリー">
          <span class="summary-label">最終確認</span>
          <strong id="features-updated">読み込み中</strong>
          <span id="features-count">比較対象</span>
        </aside>
      </div>
    </header>

    <main>
      <section class="section-header" aria-labelledby="compare-policy">
        <div>
          <p class="eyebrow">Compare</p>
          <h2 id="compare-policy">見る軸</h2>
        </div>
        <p>
          ベータ版やプレビュー版も載せます。正式利用前に、提供状態と開発者への影響をざっと確認するためのページです。
        </p>
      </section>

      <section class="feature-list" aria-labelledby="feature-list-title">
        <div class="section-titleline">
          <p class="eyebrow">Feature List</p>
          <h2 id="feature-list-title">機能一覧</h2>
        </div>
        <div id="feature-catalog" class="feature-grid" aria-live="polite">
          <p class="loading-text">機能一覧を読み込んでいます。</p>
        </div>
      </section>

      <section class="section-header compact-section" aria-labelledby="matrix-title">
        <div>
          <p class="eyebrow">Matrix</p>
          <h2 id="matrix-title">対応状況</h2>
        </div>
        <p>
          〇は使える、△は一部対応または確認が必要、×は主用途ではないものとして整理しています。
        </p>
      </section>

      <section class="table-wrap matrix-wrap" aria-label="AI機能対応状況表">
        <table class="matrix-table">
          <thead>
            <tr id="feature-matrix-head">
              <th>提供元</th>
            </tr>
          </thead>
          <tbody id="feature-matrix-body">
            <tr>
              <td>比較データを読み込んでいます。</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
