name: Crawl official AI sources

on:
  schedule:
    - cron: "17 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Crawl official sources
        run: python scripts/crawl_sources.py

      - name: Commit inbox changes
        run: |
          if git diff --quiet -- data/inbox.json; then
            echo "No inbox changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/inbox.json
          git commit -m "Update AI source inbox"
          git push
