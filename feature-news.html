<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="公式ソースにもとづくAI機能追加ニュース。"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self'; img-src 'self' data:; base-uri 'none'; frame-ancestors 'none'; form-action 'none'"
    />
    <title>AIシグナルボード | 機能追加</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body data-page="feature-news">
    <header class="site-header">
      <nav class="site-nav" aria-label="メインナビゲーション">
        <a href="index.html">ニュース</a>
        <a class="active" href="feature-news.html">機能追加</a>
        <a href="inbox.html">更新通知</a>
        <a href="compare.html">機能比較</a>
      </nav>
      <div class="hero-layout">
        <div>
          <h1>機能追加</h1>
        </div>
        <aside class="summary-panel" aria-label="機能追加サマリー">
          <span class="summary-label">最終更新</span>
          <strong id="feature-news-updated">読み込み中</strong>
          <span id="feature-news-count">機能追加ニュース</span>
        </aside>
      </div>
    </header>

    <main>
      <section
        id="feature-news-list"
        class="signal-grid"
        aria-live="polite"
        aria-label="機能追加ニュース一覧"
      >
        <p class="loading-text">機能追加ニュースを読み込んでいます。</p>
      </section>
    </main>
  </body>
</html>
